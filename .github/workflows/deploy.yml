name: deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-ftp
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      FTP_SERVER: ${{ secrets.FTP_SERVER }}
      FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
      FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      FTP_PORT: ${{ secrets.FTP_PORT || 21 }}
      FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
      APP_URL: ${{ secrets.APP_URL }}
      DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: Install PHP dependencies (production)
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend (generates public/build + wayfinder routes/actions)
        run: npm run build

      - name: Generate production environment file
        run: |
          cp .env.example .env

          # Override every key with server-specific values so the deployed
          # .env is correct regardless of your local (e.g. sqlite) setup.
          # If a secret is empty, the .env.example default is kept.
          set_key() {
            local key="$1"
            local value="$2"
            [ -z "$value" ] && return 0
            # Handle an already-active key.
            if grep -q "^${key}=" .env; then
              sed -i "s|^${key}=.*|${key}=${value}|" .env
            # Handle a commented-out key (e.g. "# DB_HOST=127.0.0.1").
            elif grep -q "^#[[:space:]]*${key}=" .env; then
              sed -i "s|^#[[:space:]]*${key}=.*|${key}=${value}|" .env
            else
              echo "${key}=${value}" >> .env
            fi
          }

          set_key APP_ENV "production"
          set_key APP_DEBUG "false"
          set_key APP_URL "${{ secrets.APP_URL || 'https://spa.kimmex.com.kh' }}"
          set_key SESSION_DRIVER "file"
          set_key CACHE_DRIVER "file"
          set_key DB_CONNECTION "${{ secrets.DB_CONNECTION }}"
          set_key DB_HOST "${{ secrets.DB_HOST }}"
          set_key DB_PORT "${{ secrets.DB_PORT }}"
          set_key DB_DATABASE "${{ secrets.DB_DATABASE }}"
          set_key DB_USERNAME "${{ secrets.DB_USERNAME }}"
          set_key DB_PASSWORD "${{ secrets.DB_PASSWORD }}"
          set_key DEPLOY_TOKEN "${{ secrets.DEPLOY_TOKEN }}"

          php artisan key:generate

          # NOTE: Do NOT run config:cache / route:cache / view:cache here.
          # They bake the CI runner's absolute paths (e.g. /home/runner/...)
          # into bootstrap/cache/*.php, which breaks the app on the server.
          # The server resolves paths at runtime from its own storage/ dir.

      - name: Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.1
        with:
          server: ${{ env.FTP_SERVER }}
          username: ${{ env.FTP_USERNAME }}
          password: ${{ env.FTP_PASSWORD }}
          port: ${{ env.FTP_PORT }}
          protocol: ftp
          local-dir: ./
          server-dir: ${{ env.FTP_SERVER_DIR }}/
          exclude: |
            **/.git*
            **/node_modules/**
            **/.env.example
            **/.env.backup
            **/.env.local
            **/.env.*.local
            **/tests/**
            **/database/seeders/**
            **/database/factories/
            **/bootstrap/cache/*.php
            **/storage/*.key
            **/storage/pail/**
            **/storage/logs/**
            **/phpunit.xml
            **/composer.*.json
            **/.editorconfig
            **/.prettierignore
            **/.gitattributes
            **/resources/js/pages/auth/**
            **/resources/js/pages/settings/**
            **/.npmrc
            **/.prettierrc
            **/eslint.config.js
            **/phpstan.neon
            **/pint.json
            **/tsconfig.json
            **/.github/**

            # .env is generated in CI from GitHub secrets and IS deployed on purpose.
            # Only the example/template files are excluded above.

      - name: Trigger post-deploy Artisan hook
        if: ${{ env.DEPLOY_TOKEN != '' && env.APP_URL != '' }}
        run: |
          URL="${{ env.APP_URL }}/deploy?token=${{ env.DEPLOY_TOKEN }}"
          echo "Calling post-deploy hook: ${URL}"
          curl -fsSL "$URL" || echo "Hook call failed (check APP_URL/DEPLOY_TOKEN secrets)."

      - name: Post-deploy server checklist
        run: |
          echo "After this deploy finishes:"
          echo "1. In cPanel File Manager, delete everything inside bootstrap/cache/ except .gitignore"
          echo "   (clears any stale /home/runner/... paths from a previous cached build)."
          echo "2. Set permissions to 755 on: storage/, storage/framework/{cache,sessions,views,logs}, bootstrap/cache/"
          echo "3. Ensure storage/logs/ exists (create it if missing)."
          echo "4. The post-deploy hook above runs migrate + cache clears automatically if DEPLOY_TOKEN is set."
