name: deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-ftp
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: Install PHP dependencies (production)
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend (generates public/build + wayfinder routes/actions)
        run: npm run build

      - name: Generate production environment file
        run: |
          cp .env.example .env

          # Override every key with server-specific values so the deployed
          # .env is correct regardless of your local (e.g. sqlite) setup.
          # If a secret is empty, the .env.example default is kept.
          set_key() {
            local key="$1"
            local value="$2"
            [ -z "$value" ] && return 0
            if grep -q "^${key}=" .env; then
              sed -i "s|^${key}=.*|${key}=${value}|" .env
            else
              echo "${key}=${value}" >> .env
            fi
          }

          set_key APP_ENV "production"
          set_key APP_DEBUG "false"
          set_key APP_URL "${{ secrets.APP_URL || 'https://spa.kimmex.com.kh' }}"
          set_key DB_CONNECTION "${{ secrets.DB_CONNECTION }}"
          set_key DB_HOST "${{ secrets.DB_HOST }}"
          set_key DB_PORT "${{ secrets.DB_PORT }}"
          set_key DB_DATABASE "${{ secrets.DB_DATABASE }}"
          set_key DB_USERNAME "${{ secrets.DB_USERNAME }}"
          set_key DB_PASSWORD "${{ secrets.DB_PASSWORD }}"

          php artisan key:generate
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache

      - name: Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.1
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT || 21 }}
          protocol: ftp
          local-dir: ./
          server-dir: ${{ secrets.FTP_SERVER_DIR }}/
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            **/.env.example
            **/.env.backup
            **/.env.local
            **/.env.*.local
            **/tests/**
            **/database/**
            **/storage/*.key
            **/storage/pail/**
            **/storage/logs/**
            **/phpunit.xml
            **/composer.*.json
            **/.editorconfig
            **/.prettierignore
            **/.gitattributes
            **/resources/js/pages/auth/**
            **/resources/js/pages/settings/**
            **/.npmrc
            **/.prettierrc
            **/eslint.config.js
            **/phpstan.neon
            **/pint.json
            **/tsconfig.json
            **/.github/**

            # .env is generated in CI from GitHub secrets and IS deployed on purpose.
            # Only the example/template files are excluded above.

